<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumberGuess</title>
    <link rel="stylesheet" href="src/output.css">
</head>

<body class="bg-blue-950">
    <!-- page-1 start  -->
    <div class="py-10" id="first">
        <div class="max-w-212.5 mx-auto bg-white pt-20 pb-5 px-10 text-center rounded-tl-2xl rounded-tr-2xl">
            <h1 class="uppercase font-bold text-3xl" id="firstHeading">Welcome to Funny guessing Game</h1>
            <input type="text" placeholder="Enter Your Name to Continue.." id="firstInput"
                class="py-3 px-5 my-7 block w-87.5 mx-auto border border-gray-500 text-center rounded-3xl font-bold opacity-50">
            <button class="py-3 px-5 font-bold text-white bg-teal-500 rounded-[20px] cursor-pointer">Start Game</button>
        </div>
        <div class="max-w-212.5 mx-auto bg-white px-10 pb-10 pt-10 text-center rounded-bl-2xl rounded-br-2xl">
            <button
                class="py-4 px-8 bg-red-700 text-white font-bold drop-shadow-xl text-3xl rounded-[53px]  border border-red-700"
                id="firstWarningText" hidden>Please Enter Your Name First!!</button>
        </div>
    </div>
    <!-- page-1 End  -->
    <!-- Page-2 Start  -->
    <div class="py-10" id="secound" hidden>
        <div class="max-w-212.5 mx-auto bg-white pt-20 pb-5 px-20 text-center rounded-tl-2xl rounded-tr-2xl ">
            <h1 class="uppercase font-bold text-3xl" id="secoundHeading">Player_One</h1>
            <input type="text" placeholder="Pick a Number Between 1 to 10" id="secoundInput"
                class="py-3 px-5 my-7 block w-87.5 mx-auto border border-gray-500 text-center rounded-3xl font-bold opacity-50">
            <button class="py-3 px-5 font-bold text-white bg-teal-500 rounded-[20px] cursor-pointer">Let's Play</button>
        </div>
        <div class="max-w-212.5 mx-auto bg-white px-10 pb-10 pt-10 text-center rounded-bl-2xl rounded-br-2xl">
            <button
                class="py-4 px-8 bg-red-700 text-white font-bold drop-shadow-xl text-3xl rounded-[53px]  border border-red-700"
                id="secoundWarningText" hidden>You Have To Pick A Number Between 1 To 10</button>
        </div>
    </div>
    <!-- Page-2 End  -->
</body>

</html>
